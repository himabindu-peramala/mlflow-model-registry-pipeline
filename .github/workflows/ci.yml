name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install mlflow scikit-learn xgboost pandas numpy

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but don't fail the build
          flake8 . --count --max-line-length=100 --statistics --exit-zero

      - name: MLflow smoke test
        run: |
          python -c "
          import mlflow
          mlflow.set_experiment('ci-smoke-test')
          with mlflow.start_run():
              mlflow.log_param('smoke_test', True)
              mlflow.log_metric('dummy_metric', 1.0)
          print('MLflow smoke test passed.')
          "
